<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CAD Cutter</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1>
      <span class="logo-icon">&#x2B21;</span>
      CAD Cutter
      <span class="version-badge" id="webui-version" title="Running web UI version">{{ webui_version }}</span>
    </h1>
    <div class="controls">
      <button id="refresh-files" class="btn-sm" data-tooltip="Scan directory for CAD files">&#x21BB; Refresh</button>
      <button id="change-dir" class="btn-sm" data-tooltip="Change parts directory">&#x1F4C1; Change Dir</button>
      <button id="browse-part" class="btn-sm" data-tooltip="Upload a part file from your computer">&#x1F4CE; Browse Part</button>
      <input id="browse-part-input" type="file" accept=".step,.stp,.stl,.obj,.3mf,.wrl,.vrml,.brep,.iges,.igs" style="display:none" />
      <button id="load-selected" class="btn-primary btn-sm" data-tooltip="Load checked files into workspace">&#x25B6; Load Selected</button>
      <span class="divider"></span>
      <span id="parts-dir-label" title="Current parts directory">Dir: .</span>
      <span class="divider"></span>
      <div class="control-group">
        <label>Axis
          <select id="axis-select">
            <option value="x">X</option>
            <option value="y">Y</option>
            <option value="z" selected>Z</option>
          </select>
        </label>
        <label>Gap
          <input id="gap-input" type="number" step="0.1" value="0" />
        </label>
        <label>Section
          <input id="section-input" type="number" min="1" step="1" placeholder="all" />
        </label>
      </div>
    </div>
  </header>

  <!-- ── Main layout ── -->
  <main>

    <!-- Sidebar -->
    <aside>

      <!-- File browser -->
      <div class="sidebar-section">
        <div class="section-header">
          <span class="icon">&#x1F4C2;</span> Available Parts
        </div>
        <div id="file-list">
          <div class="empty-state">
            <span class="empty-icon">&#x1F4E5;</span>
            <p>Click <strong>Refresh</strong> to scan for CAD files</p>
          </div>
        </div>
      </div>

      <!-- Pipeline stages -->
      <div class="sidebar-section">
        <div class="section-header">
          <span class="icon">&#x2699;</span> Pipeline Stages
        </div>
        <div class="stages">
          <button data-stage="auto_orient"><span class="stage-num">1</span> Auto-orient parts</button>
          <button data-stage="auto_scale"><span class="stage-num">2</span> Auto-scale parts</button>
          <button data-stage="cut_inner_from_mid"><span class="stage-num">3</span> Cut inner from mid</button>
          <button data-stage="export_parts"><span class="stage-num">4</span> Export parts</button>
          <button data-stage="render_whole"><span class="stage-num">5</span> Render assembly</button>
          <button data-stage="export_whole"><span class="stage-num">6</span> Export assembly</button>
        </div>
      </div>

      <!-- Gradient capability -->
      <div class="sidebar-section">
        <div class="section-header">
          <span class="icon">&#x1F308;</span> Thermal Gradient
        </div>
        <div class="gradient-controls">
          <div class="field">
            <label>Input File</label>
            <div style="display:flex;gap:6px">
              <select id="gradient-input" style="flex:1"></select>
              <button id="refresh-gradient-files" class="btn-sm btn-icon" data-tooltip="Refresh gradient file list">&#x21BB;</button>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>Mode</label>
              <select id="gradient-mode">
                <option value="top-bottom" selected>Top-Bottom</option>
                <option value="radial">Radial</option>
              </select>
            </div>
            <div class="field">
              <label>Output (.ply)</label>
              <input id="gradient-output" type="text" value="web_colored_output.ply" />
            </div>
          </div>
          <div class="field">
            <label>Render (.svg, optional)</label>
            <input id="gradient-render" type="text" value="web_colored_output.svg" />
          </div>
          <button id="run-gradient-capability" class="btn-primary" style="margin-top:4px">
            &#x25B6; Run Thermal Gradient
          </button>
        </div>
      </div>

    </aside>

    <!-- Workspace -->
    <section class="workspace">

      <!-- View toolbar -->
      <div class="view-toolbar">
        <span class="view-label">View</span>
        <button id="combined-view" class="active" data-tooltip="Show assembled model">Combined</button>
        <button id="tile-view" data-tooltip="Show parts side by side">Tile</button>
        <span class="spacer"></span>
        <button id="start-sim" data-tooltip="Drop parts with physics">Start Physics Sim</button>
      </div>

      <!-- 3D viewport -->
      <div id="main-canvas">
        <div class="viewport-hint" id="viewport-hint">
          <div class="hint-icon">&#x2B21;</div>
          <p>Load parts to begin</p>
        </div>
      </div>

      <!-- Thumbnail strip -->
      <div class="thumb-strip-header">
        <h3>Part Thumbnails</h3>
        <span class="part-count" id="part-count">0 parts</span>
      </div>
      <div id="thumbnails"></div>

    </section>

  </main>

  <!-- Status bar -->
  <div id="status-bar">
    <span class="status-dot idle" id="status-dot"></span>
    <span id="status">Ready</span>
    <div id="progress-container" class="progress-container" style="display:none">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text"></span>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <div id="debug-panel" class="debug-panel" aria-live="polite">
    <div class="debug-toolbar">
      <button id="debug-toggle" class="debug-toggle" type="button" aria-expanded="false">
        <span>Debug Log</span>
        <span id="debug-count" class="debug-count">0</span>
      </button>
      <button id="debug-copy" class="debug-copy" type="button">Copy Debug Log</button>
    </div>
    <div id="debug-log" class="debug-log hidden"></div>
  </div>

  <!-- Directory browser overlay -->
  <div id="dir-overlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="dir-modal-title">
      <div class="modal-header">
        <div>
          <div class="modal-kicker">Workspace Navigation</div>
          <h2 id="dir-modal-title">Choose Parts Directory</h2>
        </div>
        <button id="dir-close" class="btn-sm" type="button" aria-label="Close directory browser">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="dir-toolbar">
          <button id="dir-up" class="btn-sm" type="button">&#x2191; Up</button>
          <button id="dir-root" class="btn-sm" type="button">&#x2302; Root</button>
          <span id="dir-current" class="dir-current"></span>
        </div>
        <div id="dir-list" class="dir-list" aria-live="polite"></div>
      </div>
      <div class="modal-footer">
        <button id="dir-cancel" class="btn-sm" type="button">Cancel</button>
        <button id="dir-select" class="btn-primary btn-sm" type="button">Use This Directory</button>
      </div>
    </div>
  </div>

  <div id="ui-tooltip" class="ui-tooltip hidden" role="tooltip"></div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
